name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 手动触发

env:
  GO_VERSION: '1.21'

jobs:
  # 构建 job
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Setup Go environment
      run: |
        go env -w GOPROXY=https://goproxy.cn,direct
        go env -w GOMODCACHE=/tmp/go-mod
        mkdir -p /tmp/go-mod

    - name: Build Server
      run: make build-server

    - name: Build Client
      run: make build-client

    - name: Build CLI
      run: make build-cli

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: bin/
        retention-days: 7

  # 单元测试 job
  unit-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Setup Go environment
      run: |
        go env -w GOPROXY=https://goproxy.cn,direct
        go env -w GOMODCACHE=/tmp/go-mod
        mkdir -p /tmp/go-mod

    - name: Download binaries
      uses: actions/download-artifact@v4
      with:
        name: binaries
        path: bin/

    - name: Run unit tests
      run: |
        go test -v -count=1 ./pkg/... ./internal/... | tee unit_test_output.log

    - name: Generate test summary
      run: |
        echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        PASSED=$(grep -c "PASS" unit_test_output.log || echo "0")
        FAILED=$(grep -c "FAIL" unit_test_output.log || echo "0")
        echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
        echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-results
        path: unit_test_output.log
        retention-days: 7

  # E2E 测试 job
  e2e-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Setup Go environment
      run: |
        go env -w GOPROXY=https://goproxy.cn,direct
        go env -w GOMODCACHE=/tmp/go-mod
        mkdir -p /tmp/go-mod

    - name: Download binaries
      uses: actions/download-artifact@v4
      with:
        name: binaries
        path: bin/

    - name: Run E2E tests
      run: |
        go test -v -count=1 ./tests/e2e/... | tee e2e_test_output.log

    - name: Generate test summary
      run: |
        echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        PASSED=$(grep -c "PASS" e2e_test_output.log || echo "0")
        FAILED=$(grep -c "FAIL" e2e_test_output.log || echo "0")
        echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
        echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-test-results
        path: e2e_test_output.log
        retention-days: 7

  # 模拟测试 job (需要 socat)
  simulation-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Setup Go environment
      run: |
        go env -w GOPROXY=https://goproxy.cn,direct
        go env -w GOMODCACHE=/tmp/go-mod
        mkdir -p /tmp/go-mod

    - name: Install socat
      run: sudo apt-get install -y socat

    - name: Download binaries
      uses: actions/download-artifact@v4
      with:
        name: binaries
        path: bin/

    - name: Make binaries executable
      run: chmod +x bin/*

    - name: Run simulation tests (short mode)
      run: |
        go test -v -short -count=1 ./tests/simulation/... | tee simulation_test_output.log

    - name: Generate test summary
      run: |
        echo "## Simulation Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        PASSED=$(grep -c "PASS" simulation_test_output.log || echo "0")
        FAILED=$(grep -c "FAIL" simulation_test_output.log || echo "0")
        SKIPPED=$(grep -c "SKIP" simulation_test_output.log || echo "0")
        echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
        echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
        echo "| Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: simulation-test-results
        path: simulation_test_output.log
        retention-days: 7

  # Windows 构建 job (Phase 3: Windows Server + Client)
  build-windows:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Setup Go environment
      run: |
        go env -w GOPROXY=https://goproxy.cn,direct
        go env -w GOMODCACHE=/tmp/go-mod
        mkdir -p /tmp/go-mod

    - name: Build Windows server
      run: make build-server-windows

    - name: Build Windows client
      run: make build-client-windows

    - name: Upload Windows binaries
      uses: actions/upload-artifact@v4
      with:
        name: windows-binaries
        path: |
          bin/shareserial-server-windows.exe
          bin/shareserial-client-windows.exe
        retention-days: 7

  # 代码质量检查 job
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Run go fmt
      run: |
        if [ -n "$(go fmt ./...)" ]; then
          echo "::error::Code is not formatted. Run 'go fmt ./...' to fix."
          exit 1
        fi

    - name: Run go vet
      run: go vet ./...

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
        skip-pkg-cache: true

  # 发布 job (仅在 main 分支)
  release:
    runs-on: ubuntu-latest
    needs: [build, unit-test, e2e-test, simulation-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all binaries
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Prepare release package
      run: |
        mkdir -p release
        cp artifacts/binaries/* release/
        cp artifacts/windows-binaries/* release/
        cp README.md release/
        cp DEPLOY.md release/
        cp -r configs release/
        tar -czvf shareserial-${{ github.sha }}.tar.gz release/

    - name: Upload release artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-package
        path: shareserial-${{ github.sha }}.tar.gz
        retention-days: 30

    - name: Create release
      if: startsWith(github.event.head_commit.message, 'release:')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        files: shareserial-${{ github.sha }}.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}