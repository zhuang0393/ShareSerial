linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gocyclo
    - dupl
    - misspell

linters-settings:
  gocyclo:
    min-complexity: 20
  dupl:
    threshold: 150

run:
  timeout: 5m

issues:
  exclude-rules:
    # Test files: relax rules
    - path: _test\.go
      linters:
        - dupl
        - gocyclo
        - errcheck
    - path: tests/
      linters:
        - dupl
        - gocyclo
        - errcheck
    # Simulation test helpers
    - path: tests/simulation/
      linters:
        - dupl
        - gocyclo
        - errcheck
        - unused
    # Generated code
    - path: cmd/report-generator/
      linters:
        - gocyclo
        - staticcheck