linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gocyclo
    - dupl
    - misspell

linters-settings:
  gocyclo:
    min-complexity: 15
  dupl:
    threshold: 100

run:
  timeout: 5m
  skip-dirs:
    - tests/simulation/helpers
    - vendor

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - gocyclo